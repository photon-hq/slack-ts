name: check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Always build against the latest commit on the proto repo's main
      # branch, ignoring the SHA committed in slack-ts's tree. This is what
      # turns the submodule into a live source-of-truth pointer rather than
      # a frozen snapshot.
      - name: bump proto submodule to latest main
        run: git submodule update --remote --merge proto

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run generate
      - run: bun run check
      - run: bun run lint
      - run: bun test
